<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CityCare Hospital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
  <h1>🏥 CityCare Hospital</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- Hero Section -->
<section class="hero">
  <h2>Your Health, Our Priority ❤️</h2>
  <p>24/7 Emergency | Expert Doctors | Advanced Care</p>
</section>

<!-- Services -->
<section class="services">
  <div class="card">🩺 General Checkup</div>
  <div class="card">💉 Vaccination</div>
  <div class="card">🚑 Emergency</div>
</section>

<!-- Chatbot -->
<div class="chatbot">
  <div class="chat-header">🤖 Ask Me</div>
  <div class="chat-body" id="chat-body"></div>
  <div class="chat-input">
    <input type="text" id="user-input" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
